<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DB8C9"/>
      <stop offset="55%" stop-color="#A8DADC"/>
      <stop offset="100%" stop-color="#F4E5C2"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- waves -->
  <path d="M0,520 C200,560 400,470 600,510 C800,550 1000,470 1200,510 L1200,630 L0,630 Z"
        fill="#FDFCFA" opacity="0.25"/>
  <path d="M0,560 C200,590 400,520 600,560 C800,600 1000,520 1200,560 L1200,630 L0,630 Z"
        fill="#FDFCFA" opacity="0.55"/>

  <!-- decorative -->
  <text x="950" y="180" font-size="120" opacity="0.65">🏝️</text>
  <text x="120" y="540" font-size="80" opacity="0.7">🌺</text>
  <text x="1040" y="540" font-size="74" opacity="0.55">🐠</text>

  <!-- Pin -->
  <g transform="translate(110,170)">
    <circle cx="50" cy="50" r="68" fill="#FFFFFF" opacity="0.85"/>
    <path d="M50 12 C 25 12 8 33 8 56 C 8 86 35 104 50 138 C 65 104 92 86 92 56 C 92 33 75 12 50 12 Z" fill="#E84855"/>
    <circle cx="50" cy="56" r="14" fill="#FDFCFA"/>
  </g>

  <!-- Title -->
  <text x="280" y="240" font-family="'Noto Sans JP', sans-serif" font-weight="900" font-size="86" fill="#FDFCFA" letter-spacing="-2">
    うちなー子連れマップ
  </text>
  <text x="280" y="320" font-family="'Noto Sans JP', sans-serif" font-weight="700" font-size="38" fill="#1D3557">
    「授乳室ある？」「ベビーカーで入れる？」
  </text>
  <text x="280" y="372" font-family="'Noto Sans JP', sans-serif" font-weight="700" font-size="38" fill="#1D3557">
    が一目でわかる、沖縄の子連れマップ。
  </text>

  <!-- Tags -->
  <g transform="translate(280,420)" font-family="'Noto Sans JP', sans-serif" font-weight="700" font-size="26">
    <rect x="0" y="0" width="160" height="56" rx="28" fill="#FDFCFA"/>
    <text x="80" y="38" text-anchor="middle" fill="#226574">授乳室</text>

    <rect x="180" y="0" width="200" height="56" rx="28" fill="#FDFCFA"/>
    <text x="280" y="38" text-anchor="middle" fill="#226574">ベビーカーOK</text>

    <rect x="400" y="0" width="160" height="56" rx="28" fill="#FDFCFA"/>
    <text x="480" y="38" text-anchor="middle" fill="#226574">雨OK</text>

    <rect x="580" y="0" width="180" height="56" rx="28" fill="#E84855"/>
    <text x="670" y="38" text-anchor="middle" fill="#FDFCFA">沖縄南部</text>
  </g>

  <text x="600" y="595" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-weight="700" font-size="20" fill="#1D3557" opacity="0.7">
    uchina-map.nexeed-lab.com
  </text>
</svg>
